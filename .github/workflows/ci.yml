name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run installer regression tests
        run: bash tests/setup_test.sh
      - name: Validate package content
        run: bash tests/content_test.sh
